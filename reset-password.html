<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reimposta password — MyAsta Live</title>
  <meta name="robots" content="noindex" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0D0D0F;
      --surface: #111114;
      --surface-2: #16161A;
      --violet: #7C3AED;
      --violet-light: #A78BFA;
      --green: #4ade80;
      --red: #FC8181;
      --border: rgba(255, 255, 255, 0.07);
      --text: #ffffff;
      --text-dim: rgba(255, 255, 255, 0.45);
      --text-faint: rgba(255, 255, 255, 0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .glow {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .glow--top {
      top: -140px; left: -100px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.24), transparent 70%);
    }
    .glow--bottom {
      bottom: -120px; right: -80px;
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(109, 40, 217, 0.18), transparent 70%);
    }

    .card {
      position: relative;
      z-index: 1;
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 44px 36px;
      max-width: 440px;
      width: 100%;
      animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background-color: rgba(124, 58, 237, 0.16);
      border: 1px solid rgba(124, 58, 237, 0.32);
      border-radius: 12px;
      padding: 8px 14px;
      margin-bottom: 28px;
    }
    .brand__icon { font-size: 15px; line-height: 1; }
    .brand__name {
      color: var(--violet-light);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 2.5px;
    }

    h1 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .label {
      display: block;
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.4px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .field {
      position: relative;
      margin-bottom: 18px;
    }

    .input {
      width: 100%;
      background-color: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 15px 48px 15px 18px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      font-weight: 500;
      transition: border-color 0.2s ease;
    }
    .input::placeholder { color: var(--text-faint); font-weight: 400; }
    .input:focus {
      outline: none;
      border-color: rgba(124, 58, 237, 0.6);
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-faint);
      font-size: 18px;
      padding: 4px;
      line-height: 1;
    }
    .toggle-pw:hover { color: var(--text-dim); }

    .hint {
      color: var(--text-faint);
      font-size: 12px;
      margin-top: -8px;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .btn {
      width: 100%;
      background: linear-gradient(135deg, var(--violet), var(--violet-light));
      color: #fff;
      border: none;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.3px;
      padding: 16px;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 28px rgba(124, 58, 237, 0.4);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      font-family: inherit;
    }
    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(124, 58, 237, 0.5);
    }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .message {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 20px;
      display: none;
    }
    .message--error {
      background-color: rgba(252, 129, 129, 0.1);
      border: 1px solid rgba(252, 129, 129, 0.35);
      color: var(--red);
    }
    .message--info {
      background-color: rgba(167, 139, 250, 0.1);
      border: 1px solid rgba(167, 139, 250, 0.3);
      color: var(--violet-light);
    }

    .footer {
      margin-top: 28px;
      text-align: center;
      color: var(--text-faint);
      font-size: 11px;
      line-height: 1.8;
    }
    .footer a { color: var(--text-dim); text-decoration: none; }
    .footer a:hover { color: var(--violet-light); }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
      h1 { font-size: 21px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .card, .btn { animation: none; transition: none; }
    }
  </style>
</head>
<body>
  <div class="glow glow--top"></div>
  <div class="glow glow--bottom"></div>

  <main class="card">
    <div class="brand">
      <span class="brand__icon">⚡</span>
      <span class="brand__name">MY ASTA LIVE</span>
    </div>

    <h1>Reimposta la password</h1>
    <p class="subtitle">
      Scegli una nuova password per il tuo account.
      Assicurati che sia sicura e facile da ricordare.
    </p>

    <div id="message" class="message"></div>

    <form id="resetForm">
      <label class="label" for="password">Nuova password</label>
      <div class="field">
        <input
          class="input"
          type="password"
          id="password"
          placeholder="Minimo 6 caratteri"
          autocomplete="new-password"
          required
        />
        <button type="button" class="toggle-pw" data-target="password" aria-label="Mostra password">👁</button>
      </div>

      <label class="label" for="confirmPassword">Conferma password</label>
      <div class="field">
        <input
          class="input"
          type="password"
          id="confirmPassword"
          placeholder="Ripeti la password"
          autocomplete="new-password"
          required
        />
        <button type="button" class="toggle-pw" data-target="confirmPassword" aria-label="Mostra password">👁</button>
      </div>
      <p class="hint">La password deve contenere almeno 6 caratteri.</p>

      <button type="submit" class="btn" id="submitBtn">Aggiorna password</button>
    </form>

    <div class="footer">
      MyAsta Live — Sfida chi vuoi nella tua asta live<br>
      🌐 <a href="https://myastalive.com">myastalive.com</a>
      &nbsp;·&nbsp;
      ✉️ <a href="mailto:info@myastalive.com">info@myastalive.com</a>
    </div>
  </main>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://htstnjsbieqiioweewej.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh0c3RuanNiaWVxaWlvd2Vld2VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE0MDQ1MTQsImV4cCI6MjA3Njk4MDUxNH0.U7SKIkJWITb4e4JfFWE0Q531wfp63yQvvbad1CgqJFo';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('resetForm');
    const messageEl = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');
    const passwordEl = document.getElementById('password');
    const confirmEl = document.getElementById('confirmPassword');

    // Toggle visibilità password
    document.querySelectorAll('.toggle-pw').forEach((btn) => {
      btn.addEventListener('click', () => {
        const target = document.getElementById(btn.dataset.target);
        target.type = target.type === 'password' ? 'text' : 'password';
      });
    });

    function showMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = `message message--${type}`;
      messageEl.style.display = 'block';
    }

    // Verifica che l'utente sia arrivato con un token di recovery valido
    let sessionReady = false;

    supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY' || session) {
        sessionReady = true;
      }
    });

    // Controllo iniziale: se non c'è token nell'URL, avvisa
    window.addEventListener('load', async () => {
      const { data } = await supabase.auth.getSession();
      if (data.session) {
        sessionReady = true;
      } else {
        // Aspetta un attimo che onAuthStateChange processi il token dall'URL
        setTimeout(async () => {
          const { data: retry } = await supabase.auth.getSession();
          if (!retry.session && !sessionReady) {
            showMessage(
              'Link non valido o scaduto. Richiedi un nuovo link di reset dall\'app.',
              'error'
            );
            submitBtn.disabled = true;
          }
        }, 1500);
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const password = passwordEl.value;
      const confirm = confirmEl.value;

      // Validazioni
      if (password.length < 6) {
        showMessage('La password deve contenere almeno 6 caratteri.', 'error');
        return;
      }
      if (password !== confirm) {
        showMessage('Le password non coincidono. Riprova.', 'error');
        return;
      }

      // Loading
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>';

      try {
        const { error } = await supabase.auth.updateUser({ password });

        if (error) {
          showMessage(`Errore: ${error.message}`, 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Aggiorna password';
          return;
        }

        // Successo → redirect alla pagina di conferma
        showMessage('Password aggiornata! Reindirizzamento...', 'info');
        setTimeout(() => {
          window.location.href = 'password-reset-success.html';
        }, 1000);

      } catch (err) {
        showMessage('Errore imprevisto. Riprova.', 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Aggiorna password';
      }
    });
  </script>
</body>
</html>
